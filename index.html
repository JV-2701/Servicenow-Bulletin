<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNPulse | ServiceNow News Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* [Keeping your original styles exactly as they were, just adding minor layout fixes] */
        :root { --bg: #0a0c10; --surface: #111318; --surface2: #181c24; --border: #1e2330; --accent: #00d4ff; --accent2: #7c3aed; --accent3: #10b981; --text: #e8eaf0; --muted: #6b7280; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index: 0; }
        header { position: relative; z-index: 10; padding: 36px 40px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 38px; height: 38px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: grid; place-items: center; font-size: 18px; }
        .logo-text { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .logo-text span { color: var(--accent); }
        main { position: relative; z-index: 5; padding: 32px 40px; max-width: 1400px; margin: 0 auto; }
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 36px; }
        .filter-tile { display: flex; align-items: center; gap: 8px; padding: 10px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; font-size: 13px; transition: all 0.2s; position: relative; }
        .filter-tile.active { border-color: var(--tile-color); background: var(--surface2); }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        .news-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: transform 0.2s; }
        .news-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 20px; flex: 1; }
        .card-title { font-family: 'Syne', sans-serif; font-size: 16px; margin-bottom: 10px; line-height: 1.4; }
        .card-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">SN<span>Pulse</span></div>
        </div>
        <button class="btn" onclick="doFetch()" id="refreshBtn" style="background: var(--surface2); color: white; padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer;">↻ Refresh Feed</button>
    </header>

    <main>
        <div class="filter-row" id="filterRow">
            <div class="filter-tile active" style="--tile-color:#00d4ff" onclick="setFilter('all', this)"><span>📰</span> All</div>
            <div class="filter-tile" style="--tile-color:#10b981" onclick="setFilter('ai', this)"><span>🤖</span> AI</div>
            <div class="filter-tile" style="--tile-color:#f59e0b" onclick="setFilter('release', this)"><span>🚀</span> Releases</div>
        </div>

        <div id="newsContainer">
            <div class="spinner"></div>
        </div>
    </main>

    <script>
        let allArticles = [];
        let activeFilter = 'all';

        async function doFetch() {
            const container = document.getElementById('newsContainer');
            container.innerHTML = '<div class="spinner"></div>';
            try {
                // IMPORTANT: We call our Vercel API, not GNews
                const response = await fetch('/api/news?q=ServiceNow');
                const data = await response.json();
                
                if (data.articles) {
                    allArticles = data.articles.map(a => ({
                        ...a,
                        _topic: a.title.toLowerCase().includes('ai') ? 'ai' : 
                                a.title.toLowerCase().includes('xanadu') ? 'release' : 'all'
                    }));
                    renderArticles();
                }
            } catch (err) {
                container.innerHTML = `<p style="text-align:center; color:red;">Error: ${err.message}</p>`;
            }
        }

        function setFilter(filter, el) {
            activeFilter = filter;
            document.querySelectorAll('.filter-tile').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderArticles();
        }

        function renderArticles() {
            const container = document.getElementById('newsContainer');
            const filtered = activeFilter === 'all' ? allArticles : allArticles.filter(a => a._topic === activeFilter);
            
            container.innerHTML = `<div class="news-grid">` + filtered.map(a => `
                <a class="news-card" href="${a.url}" target="_blank">
                    <img class="card-img" src="${a.image || 'https://via.placeholder.com/300x180'}" alt="">
                    <div class="card-body">
                        <div class="card-title">${a.title}</div>
                        <div class="card-desc">${a.description || ''}</div>
                    </div>
                </a>
            `).join('') + `</div>`;
        }

        // Auto-fetch on load
        doFetch();
    </script>
</body>
</html>
