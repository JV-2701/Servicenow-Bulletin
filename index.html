<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNPulse | AI-Powered ServiceNow Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* NEW VIBRANT PALETTE */
            --bg-deep: #05070a;
            --bg-card: #0f172a; /* Deep Indigo-Navy */
            --accent-glow: #10b981; /* Emerald Green */
            --accent-blue: #38bdf8; /* Electric Blue */
            --border-line: #1e293b;
            --text-bright: #f8fafc;
            --text-dim: #94a3b8;
            --gradient-main: linear-gradient(135deg, #10b981, #3b82f6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-deep); 
            color: var(--text-bright); 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6;
        }

        header {
            padding: 20px 5%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-line);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .logo-text { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -1px; }
        .logo-text span { background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        main { max-width: 1400px; margin: 0 auto; padding: 40px 5%; }

        /* VIBRANT CATEGORY CHIPS */
        .filter-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 40px; }
        .filter-tile {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-line);
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px; font-weight: 600;
            transition: all 0.3s;
            color: var(--text-dim);
        }
        .filter-tile:hover { border-color: var(--accent-glow); color: var(--text-bright); background: #1e293b; }
        .filter-tile.active { 
            background: var(--gradient-main); 
            color: white; border: none;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        /* NEWS GRID */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .news-card {
            background: var(--bg-card);
            border: 1px solid var(--border-line);
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }
        .news-card:hover { transform: translateY(-8px); border-color: var(--accent-blue); box-shadow: 0 12px 24px rgba(0,0,0,0.5); }
        .card-img { width: 100%; height: 180px; object-fit: cover; opacity: 0.8; }
        .card-body { padding: 20px; }
        .card-title { font-family: 'Poppins'; font-size: 16px; margin-bottom: 10px; color: #fff; }

        /* MODAL / SUMMARY POPUP */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(10px);
            padding: 20px;
        }
        .modal-content {
            background: var(--bg-card);
            max-width: 600px; width: 100%;
            border-radius: 24px;
            border: 1px solid var(--border-line);
            padding: 40px;
            position: relative;
            animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .close-modal { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; color: var(--text-dim); }
        .modal-title { font-family: 'Poppins'; font-size: 20px; margin-bottom: 15px; color: var(--accent-blue); }
        .modal-summary { font-size: 15px; color: var(--text-dim); margin-bottom: 25px; line-height: 1.8; }
        
        .btn-full {
            display: inline-block; padding: 12px 24px;
            background: var(--gradient-main);
            color: white; text-decoration: none;
            border-radius: 10px; font-weight: 600;
        }

        .tag-pill {
            font-size: 10px; text-transform: uppercase; font-weight: 800;
            padding: 4px 10px; border-radius: 6px; background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue); margin-bottom: 10px; display: inline-block;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">SN<span>Pulse.AI</span></div>
    <button class="filter-tile" onclick="doFetch()">↻ Refresh Ecosystem</button>
</header>

<main>
    <div class="filter-row" id="filterRow">
        <div class="filter-tile active" onclick="setFilter('all', this)">All News</div>
        <div class="filter-tile" onclick="setFilter('ai', this)">AI & Agents</div>
        <div class="filter-tile" onclick="setFilter('certs', this)">Certifications</div>
        <div class="filter-tile" onclick="setFilter('financials', this)">Market</div>
    </div>

    <div id="newsContainer" class="news-grid"></div>
</main>

<div id="summaryModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeModal()">×</span>
        <div id="modalTag" class="tag-pill">NEWS</div>
        <h2 id="modalTitle" class="modal-title"></h2>
        <p id="modalSummary" class="modal-summary"></p>
        <a id="modalLink" href="#" target="_blank" class="btn-full">Read Full Article →</a>
    </div>
</div>

<script>
    let allArticles = [];
    let activeFilter = 'all';

    async function doFetch() {
        const container = document.getElementById('newsContainer');
        container.innerHTML = '<p>Syncing with ServiceNow Pulse...</p>';
        try {
            const response = await fetch('/api/news.mjs');
            const data = await response.json();
            allArticles = data.articles.map(a => ({ ...a, _topic: classify(a) }));
            render();
        } catch (err) { console.error(err); }
    }

    function classify(a) {
        const txt = (a.title + a.description).toLowerCase();
        if (/\b(stock|earnings|revenue|market)\b/.test(txt)) return 'financials';
        if (/\b(ai|assist|intelligence|llm|bot)\b/.test(txt)) return 'ai';
        if (/\b(csa|cert|exam|learning|badge)\b/.test(txt)) return 'certs';
        return 'all';
    }

    function render() {
        const container = document.getElementById('newsContainer');
        const filtered = activeFilter === 'all' ? allArticles : allArticles.filter(a => a._topic === activeFilter);
        
        container.innerHTML = filtered.map((a, i) => `
            <div class="news-card" onclick="openModal(${i})">
                <img class="card-img" src="${a.image || 'https://via.placeholder.com/400x200?text=ServiceNow'}" />
                <div class="card-body">
                    <div class="tag-pill">${a._topic.toUpperCase()}</div>
                    <h3 class="card-title">${a.title}</h3>
                </div>
            </div>
        `).join('');
    }

    function openModal(index) {
        const a = allArticles[index];
        document.getElementById('modalTitle').innerText = a.title;
        // Combining description and content for a "Fuller" summary
        document.getElementById('modalSummary').innerText = (a.description || "") + "\n\n" + (a.content || "");
        document.getElementById('modalTag').innerText = a._topic.toUpperCase();
        document.getElementById('modalLink').href = a.url;
        document.getElementById('summaryModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('summaryModal').style.display = 'none';
    }

    function setFilter(f, el) {
        activeFilter = f;
        document.querySelectorAll('.filter-tile').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        render();
    }

    doFetch();
</script>
</body>
</html>
