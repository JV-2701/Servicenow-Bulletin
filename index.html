<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNPulse | The Official ServiceNow Ecosystem News Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ─── Modern ServiceNow Brand Palette & Reset ─────────────────── */
        :root {
            /* ServiceNow Brand Colors */
            --sn-green: #81B5A3;       /* Aura Green (Primary Accent) */
            --sn-graphite: #21282D;    /* Graphite Grey (Surface) */
            --sn-dark: #121619;        /* Deeper Background */
            --sn-border: #3A434A;     /* Subtle Contrast */
            --sn-blue: #0081C1;        /* Aeris Blue (Secondary Highlights) */
            
            /* Text & Space */
            --text-main: #EAEAEA;
            --text-muted: #9BA3A9;
            --font-head: 'Poppins', sans-serif;
            --font-body: 'Inter', sans-serif;
            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 32px;
            --space-xl: 48px;
            
            /* Modern UI Elements */
            --radius-main: 12px;
            --radius-pill: 100px;
            --shadow-subtle: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { 
            background: var(--sn-dark); 
            color: var(--text-main); 
            font-family: var(--font-body); 
            min-height: 100vh; 
            overflow-x: hidden; 
            padding-bottom: var(--space-xl);
        }

        /* Subtle modern background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Header ─────────────────────────────────────────────── */
        header { 
            position: sticky; top: 0; z-index: 100;
            background: rgba(18, 22, 25, 0.9);
            backdrop-filter: blur(12px);
            padding: var(--space-sm) 5%;
            display: flex; align-items: center; justify-content: space-between; 
            border-bottom: 1px solid var(--sn-border);
            box-shadow: var(--shadow-subtle);
        }

        .logo { display: flex; align-items: center; gap: var(--space-xs); text-decoration: none; }
        .logo-icon { 
            width: 32px; height: 32px; 
            background: var(--sn-green); 
            border-radius: var(--radius-main); 
            display: grid; place-items: center; 
            font-size: 16px; color: #000;
        }
        .logo-text { 
            font-family: var(--font-head); 
            font-size: 18px; font-weight: 800; color: #FFF;
        }
        .logo-text span { color: var(--sn-green); }

        .header-meta { font-size: 12px; color: var(--text-muted); text-align: right; font-weight: 500;}

        /* Modernized Refresh Button */
        .btn-refresh {
            background: var(--sn-graphite);
            color: var(--text-main);
            border: 1px solid var(--sn-border);
            padding: 10px 20px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-size: 12px; font-weight: 600;
            transition: all 0.2s ease-in-out;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-refresh:hover { background: var(--sn-border); transform: scale(1.02); }
        .btn-refresh:active { transform: scale(0.98); }

        /* ─── Main Content & Expanded Filtering ───────────────────── */
        main { position: relative; z-index: 5; max-width: 1400px; margin: 0 auto; padding: var(--space-xl) 5%; }

        .section-header { margin-bottom: var(--space-lg); display: flex; justify-content: space-between; align-items: center;}
        .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; }
        .results-count { font-size: 13px; color: var(--text-muted); }

        /* Modern, Spacious Filter Tiles */
        .filter-row { 
            display: flex; gap: var(--space-sm); flex-wrap: wrap; 
            margin-bottom: var(--space-lg); padding-bottom: 5px; /* prevent shadow cutoff */
        }

        .filter-tile { 
            display: flex; align-items: center; gap: 8px; 
            padding: 12px 20px; 
            background: var(--sn-graphite); 
            border: 1px solid var(--sn-border); 
            border-radius: var(--radius-pill); 
            cursor: pointer; 
            font-size: 13px; font-weight: 500; color: var(--text-muted); 
            transition: all 0.2s ease; user-select: none;
            position: relative;
        }
        .filter-tile:hover { 
            border-color: var(--sn-green); color: #FFF;
            box-shadow: 0 4px 10px rgba(129, 181, 163, 0.2);
        }
        .filter-tile.active { 
            border-color: var(--sn-green); color: #FFF; background: rgba(129, 181, 163, 0.1); 
            font-weight: 600;
        }

        .filter-tile .tile-emoji { font-size: 14px; opacity: 0.8;}
        .filter-tile.active .tile-emoji { opacity: 1; transform: scale(1.1);}

        /* Number counter indicator */
        .tile-count {
            background: var(--sn-border); font-size: 10px; font-weight: 700; 
            padding: 2px 7px; border-radius: var(--radius-pill); color: var(--text-muted); 
            min-width: 22px; text-align: center; margin-left: var(--space-xs);
        }
        .filter-tile.active .tile-count { background: var(--sn-green); color: #000; }

        /* ─── Modern News Grid & Cards ──────────────────────────── */
        .news-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: var(--space-lg); 
            min-height: 50vh;
        }

        .news-card { 
            background: var(--sn-graphite); 
            border: 1px solid var(--sn-border); 
            border-radius: var(--radius-main); 
            overflow: hidden; text-decoration: none; color: inherit; 
            display: flex; flex-direction: column; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            opacity: 0; transform: translateY(10px); animation: fadeInUp 0.3s forwards;
            box-shadow: var(--shadow-subtle);
        }

        .news-card:hover { 
            transform: translateY(-5px); border-color: rgba(129, 181, 163, 0.4); 
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), 0 0 15px rgba(129, 181, 163, 0.1);
        }

        .card-img { 
            width: 100%; height: 200px; 
            object-fit: cover; border-bottom: 1px solid var(--sn-border);
            display: block; 
        }
        .card-img-placeholder { 
            width: 100%; height: 200px; background: #000; border-bottom: 1px solid var(--sn-border); 
            display: flex; align-items: center; justify-content: center; font-size: 40px; opacity: 0.2; 
        }

        .card-body { 
            padding: var(--space-md); flex: 1; display: flex; flex-direction: column; gap: var(--space-xs);
        }

        /* The modern tag/pill style */
        .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { 
            font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; 
            padding: 3px 9px; border-radius: var(--radius-pill); border: 1px solid; 
        }

        .card-title { 
            font-family: var(--font-head); font-size: 16px; font-weight: 700; color: #FFF; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .card-desc { 
            font-size: 13px; color: var(--text-muted); line-height: 1.6; 
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }

        .card-footer { 
            margin-top: auto; padding: var(--space-md) var(--space-md) var(--space-sm); border-top: 1px solid var(--sn-border); 
            display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--text-muted); 
        }
        .card-source { display: flex; align-items: center; gap: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
        .source-dot { width: 6px; height: 6px; border-radius: var(--radius-pill); background: var(--sn-green); }

        /* ─── State Screens & Animations ───────────────────────────── */
        .spinner { width: 40px; height: 40px; border: 4px solid var(--sn-graphite); border-top-color: var(--sn-green); border-radius: 50%; animation: spin 1s linear infinite; margin: var(--space-xl) auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* State message optimization */
        .state-message { text-align: center; padding: var(--space-xl) var(--space-sm); display: flex; flex-direction: column; align-items: center; gap: var(--space-sm); color: var(--text-muted);}
        .state-icon { font-size: 48px;}

        /* Responsive Optimization */
        @media (max-width: 768px) {
            header { padding: var(--space-xs) var(--space-sm); }
            main { padding: var(--space-lg) var(--space-sm); }
            .news-grid { grid-template-columns: 1fr; }
            .filter-row { gap: 8px; }
            .filter-tile { padding: 10px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">SN<span>Pulse</span></div>
        </a>
        <div style="display:flex;align-items:center;gap:14px;">
            <div class="header-meta" id="lastUpdated">Updated | --</div>
            <button class="btn-refresh" onclick="doFetch()" id="refreshBtn">↻ Refresh</button>
        </div>
    </header>

    <main>
        <div class="section-header">
            <div class="section-label">Categories</div>
            <div class="results-count" id="resultsInfo">Fetching ecosystem pulse...</div>
        </div>

        <div class="filter-row" id="filterRow">
            <div class="filter-tile active" onclick="setFilter('all', this)"><span class="tile-emoji">📰</span> All News<span class="tile-count" id="count-all">0</span></div>
            <div class="filter-tile" onclick="setFilter('official', this)"><span class="tile-emoji">🏢</span> Official SN<span class="tile-count" id="count-official">0</span></div>
            <div class="filter-tile" onclick="setFilter('certs', this)"><span class="tile-emoji">🎓</span> Certifications<span class="tile-count" id="count-certs">0</span></div>
            <div class="filter-tile" onclick="setFilter('platform', this)"><span class="tile-emoji">🚀</span> Releases & Platform<span class="tile-count" id="count-platform">0</span></div>
            <div class="filter-tile" onclick="setFilter('ai', this)"><span class="tile-emoji">🤖</span> AI & Automation<span class="tile-count" id="count-ai">0</span></div>
            <div class="filter-tile" onclick="setFilter('events', this)"><span class="tile-emoji">📅</span> Events & Community<span class="tile-count" id="count-events">0</span></div>
            <div class="filter-tile" onclick="setFilter('financials', this)"><span class="tile-emoji">📈</span> Financials<span class="tile-count" id="count-financials">0</span></div>
            <div class="filter-tile" onclick="setFilter('developer', this)"><span class="tile-emoji">👨🏼‍💻</span> Developer Hub<span class="tile-count" id="count-developer">0</span></div>
        </div>

        <div id="newsContainer">
            <div class="spinner"></div>
        </div>
    </main>

    <script>
        let allArticles = [];
        let activeFilter = 'all';

        // ─── Metadata for categories (Colors & Labels) ──────────────
        const categoryData = {
            all:        { label: 'All', color: '#81B5A3' }, 
            official:   { label: 'Official SN', color: '#FFFFFF' }, 
            certs:      { label: 'Certifications', color: '#0081C1' }, 
            platform:   { label: 'Platform Update', color: '#F3A15D' }, 
            ai:         { label: 'AI & Auto', color: '#7E6B8D' }, 
            events:     { label: 'Event', color: '#EB6841' }, 
            financials: { label: 'Financials', color: '#4CAF50' },
            developer:  { label: 'Developer', color: '#FFD54F' },
            general:    { label: 'General Ecosystem', color: '#9BA3A9' }
        };

        // ─── NEW: Detailed Classification Logic ────────────────────────
    function classifyArticle(article) {
    const title = article.title.toLowerCase();
    const desc = (article.description || '').toLowerCase();
    const source = (article.source?.name || '').toLowerCase();

    // 1. Official SN (Direct sources or high-level corporate announcements)
    if (source.includes('servicenow') || source.includes('press') || /partners|joins|acquires|announces/.test(title)) return 'official';

    // 2. Certifications (Broaden to include 'training', 'learning', 'exam')
    if (/cert|exam|voucher|learning|training|badge|csa|cis|cad|pathway/.test(title + desc)) return 'certs';

    // 3. Platform & Releases (Include 'update', 'feature', 'now platform', 'vancouver', 'washington', 'xanadu')
    if (/release|update|feature|version|upgrade|patch|xanadu|washington|vancouver|platform/.test(title + desc)) return 'platform';

    // 4. AI & Automation (Broaden to 'agent', 'bot', 'intelligence', 'assist')
    if (/ai|artificial|intelligence|assist|bot|agent|automation|machine|generative|llm/.test(title + desc)) return 'ai';

    // 5. Financials (Include 'stock', 'revenue', 'growth', 'earnings', 'nasdaq')
    if (/stock|revenue|earnings|financial|profit|investor|nasdaq|quarterly|price/.test(title + desc)) return 'financials';

    // 6. Developer Hub (Include 'api', 'code', 'script', 'integration', 'studio')
    if (/api|code|script|integration|dev|studio|portal|workflow/.test(title + desc)) return 'developer';
    
    // 7. Events (Include 'summit', 'world', 'forum', 'webinar')
    if (/summit|world|forum|webinar|event|community/.test(title + desc)) return 'events';

    return 'general';
}

        async function doFetch() {
            const container = document.getElementById('newsContainer');
            const infoText = document.getElementById('resultsInfo');
            
            container.innerHTML = '<div class="spinner"></div>';
            infoText.innerText = "Connecting to the ecosystem pulse...";
            
            try {
               const response = await fetch('/api/news.mjs?q=ServiceNow'); // Broader query
                const data = await response.json();
                
                if (data.articles) {
                    allArticles = data.articles.map(a => ({
                        ...a,
                        _topic: classifyArticle(a)
                    }));
                    
                    updateCategoryCounts();
                    renderArticles();
                    document.getElementById('lastUpdated').innerText = `Updated | ${new Date().toLocaleTimeString()}`;
                } else {
                    throw new Error(data.message || 'No news returned.');
                }
            } catch (err) {
                container.innerHTML = `<div class="state-message"><div class="state-icon">❌</div><p>Failed to pulse the news: ${err.message}</p></div>`;
                infoText.innerText = "Error encountered.";
            }
        }

        // Updated for individual counts
        function updateCategoryCounts() {
            // Count All
            document.getElementById('count-all').innerText = allArticles.length;
            
            // Count granular categories
            const granularCats = Object.keys(categoryData).filter(key => key !== 'all' && key !== 'general');
            
            granularCats.forEach(cat => {
                const countEl = document.getElementById(`count-${cat}`);
                if (countEl) {
                    const count = allArticles.filter(a => a._topic === cat).length;
                    countEl.innerText = count;
                }
            });
        }

        function setFilter(filter, el) {
            activeFilter = filter;
            document.querySelectorAll('.filter-tile').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderArticles();
        }

        function renderArticles() {
            const container = document.getElementById('newsContainer');
            const infoText = document.getElementById('resultsInfo');
            const filtered = activeFilter === 'all' ? allArticles : allArticles.filter(a => a._topic === activeFilter);
            
            // Update info text
            infoText.innerText = `Showing ${filtered.length} pulse points in selected category.`;

            if (filtered.length === 0) {
                container.innerHTML = `<div class="state-message"><div class="state-icon">🔍</div><p>No pulses found in this category.</p></div>`;
                return;
            }

            container.innerHTML = `<div class="news-grid">` + filtered.map((a, index) => {
                const catInfo = categoryData[a._topic] || categoryData.general;
                const timeAgo = formatRelativeTime(a.publishedAt);
                const sourceLabel = (a.source?.name || 'Unknown Source').substring(0, 30);
                const animationDelay = (index * 40) + 'ms'; // Cascade animation

                return `
                <a class="news-card" href="${a.url}" target="_blank" style="animation-delay: ${animationDelay};">
                    ${a.image ? `<img class="card-img" src="${a.image}" alt="">` : `<div class="card-img-placeholder">⚡</div>`}
                    <div class="card-body">
                        <div class="card-tags">
                            <span class="tag" style="color: ${catInfo.color}; border-color: ${catInfo.color};">${catInfo.label}</span>
                        </div>
                        <div class="card-title">${a.title}</div>
                        <div class="card-desc">${a.description || ''}</div>
                    </div>
                    <div class="card-footer">
                        <div class="card-source">
                            <span class="source-dot" style="background: ${catInfo.color};"></span>
                            ${sourceLabel}
                        </div>
                        <div>${timeAgo}</div>
                    </div>
                </a>
            `}).join('') + `</div>`;
        }

        function formatRelativeTime(dateString) {
            if (!dateString) return '--';
            const date = new Date(dateString);
            const now = new Date();
            const diffInSeconds = Math.floor((now - date) / 1000);
            
            if (diffInSeconds < 60) return `${diffInSeconds}s ago`;
            if (diffInSeconds < 3600) return `${Math.floor(diffInSeconds / 60)}m ago`;
            if (diffInSeconds < 86400) return `${Math.floor(diffInSeconds / 3600)}h ago`;
            return `${Math.floor(diffInSeconds / 86400)}d ago`;
        }

        // Auto-fetch on load
        doFetch();
    </script>
</body>
</html>
